<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Virtual Screen</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.7.1/dist/aframe-master.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <style>
        #menu-overlay {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
        #menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            background: white;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        #menu-dropdown.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Three-dot menu -->
    <div id="menu-overlay" class="has-text-right">
        <button id="menu-btn" class="button is-dark is-rounded m-2">⋮</button>
        <div id="menu-dropdown" class="dropdown-content">
            <button id="change-image-btn" class="button is-text is-fullwidth">Change Image</button>
            <button id="camera-distance-btn" class="button is-text is-fullwidth">Camera Distance</button>
        </div>
    </div>

    <!-- Upload form overlay -->
    <div id="form-overlay" class="modal is-active">
        <div class="modal-background"></div>
        <div id="upload-form" class="modal-content box">
            <h2 class="title is-4 mb-4">Select an Image</h2>
            <div class="file has-name is-centered mb-4">
                <label class="file-label">
                    <input class="file-input" type="file" id="image-input" accept="image/*">
                    <span class="file-cta">
                        <span class="file-icon">
                            <i class="fas fa-upload"></i>
                        </span>
                        <span class="file-label">
                            Choose a file…
                        </span>
                    </span>
                    <span class="file-name" id="preview-text">No file chosen</span>
                </label>
            </div>
        </div>
    </div>

    <!-- Camera distance overlay -->
    <div id="camera-distance-overlay" class="modal">
        <div class="modal-background"></div>
        <div id="camera-distance-form" class="modal-content box">
            <h2 class="title is-4 mb-4">Camera Distance</h2>
            <input class="slider is-fullwidth" id="camera-distance-slider" type="range" min="1" max="10" step="0.1" value="5">
            <p class="has-text-centered" id="camera-distance-value">5</p>
        </div>
    </div>

    <!-- A-Frame Scene -->
    <a-scene vr-mode-ui="enabled: true">
        <!-- Sky (black background) -->
        <a-sky color="#000000"></a-sky>

        <!-- Camera -->
        <a-entity id="camera-rig" position="0 0 5">
            <a-camera look-controls="pointerLockEnabled: false"></a-camera>
        </a-entity>

        <!-- Virtual Screen (green rectangle) -->
        <a-plane id="virtual-screen"
                 color="#006400"
                 width="16"
                 height="9"
                 position="0 1.5 0"
                 rotation="0 0 0">
        </a-plane>

        <!-- Image container (empty initially) -->
        <a-image id="uploaded-image"
                 visible="false"
                 position="0 1.5 0">
        </a-image>
    </a-scene>

    <script src="app.js"></script>
</body>
</html>
